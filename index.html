<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment 2 — Reveal.js | Mariam chajia</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reset.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css"
    />
    <!-- Non-default theme (not black/white) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/moon.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/monokai.css"
    />
  </head>
  <body>
    <div class="reveal">
      <div class="slides">
        <!-- Slide 1: title + required attribution + open resource -->
        <section>
          <h2>Assignment 2</h2>
          <h3>Presentation with Reveal.js</h3>
          <p>
            <strong>Mariam chajia</strong> · <strong>78241</strong>
          </p>
          <p class="fragment">
            <small
              >Open resource:
              <a
                href="https://revealjs.com/installation/#basic-setup"
                target="_blank"
                rel="noopener noreferrer"
                >Reveal.js — Basic setup</a
              ></small
            >
          </p>
        </section>

        <!-- Slide 2: horizontal — Markdown via data-markdown -->
        <section data-markdown>
          <textarea data-template>
## Why this framework?

- **HTML slides** in the browser — no proprietary format
- **Markdown** for faster authoring ([syntax](https://revealjs.com/markup/))
- **Themes** and plugins ([config](https://revealjs.com/config/))

> Start here: [Installation — basic setup](https://revealjs.com/installation/#basic-setup)
          </textarea>
        </section>

        <!-- Slides 3–4: vertical stack (↓ / ↑ between these; → for next column) -->
        <section>
          <section data-markdown>
            <textarea data-template>
## Vertical stack (1 / 2)

Use **arrow down** to go deeper in this column.

This demonstrates **vertical navigation**.
            </textarea>
          </section>
          <section data-markdown>
            <textarea data-template>
## Vertical stack (2 / 2)

Use **arrow right** to move to the **next horizontal** slide.

Horizontal + vertical navigation are both enabled.
            </textarea>
          </section>
        </section>

        <!-- Slide 5: image — local asset + remote image -->
        <section>
          <h3>Images</h3>
          <div
            style="
              display: grid;
              grid-template-columns: 1fr 1fr;
              gap: 1rem;
              align-items: center;
            "
          >
            <figure>
              <img
                src="assets/diagram.svg"
                alt="Local SVG diagram"
                style="max-height: 280px; margin: 0 auto"
              />
              <figcaption>
                <small>Local asset (<code>assets/diagram.svg</code>)</small>
              </figcaption>
            </figure>
            <figure>
              <img
                src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=800&q=80"
                alt="Earth from space"
                style="max-height: 280px; margin: 0 auto"
              />
              <figcaption>
                <small
                  >Remote image (Unsplash) — requires network when presenting</small
                >
              </figcaption>
            </figure>
          </div>
        </section>

        <!-- Slide 6: sources -->
        <section data-markdown>
          <textarea data-template>
## Sources &amp; deployment

| Topic | Link |
| ----- | ---- |
| Basic setup | [revealjs.com/installation](https://revealjs.com/installation/#basic-setup) |
| Markup | [revealjs.com/markup](https://revealjs.com/markup/) |
| Themes | [revealjs.com/themes](https://revealjs.com/themes/) |
| GitHub Pages | [pages.github.com](https://pages.github.com/) |

**Tip:** publish this folder as a GitHub repo and enable **Pages** (branch `main`, folder `/` or `/docs`).
          </textarea>
        </section>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/markdown/markdown.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/highlight/highlight.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>
    <script>
      Reveal.initialize({
        hash: true,
        slideNumber: "c/t",
        navigationMode: "default",
        transition: "slide",
        backgroundTransition: "fade",
        plugins: [RevealMarkdown, RevealHighlight, RevealNotes],
      });
    </script>
  </body>
</html>
